version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: stockflow_db
    restart: always
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER} -d ${PGDATABASE}"]
      interval: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: stockflow_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
